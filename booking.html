<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440, initial-scale=1.0" />
    <title>DEYA — Booking</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="nav-logo">
        <img class="nav-wordmark" src="source/main/logo.png" alt="DEYA" />
        <span class="nav-tagline">Back to<br />Sunday Scrub</span>
      </a>
      <ul class="nav-links">
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="program.html">PROGRAM</a></li>
        <li><a href="booking.html" class="active">BOOKING</a></li>
        <li><a href="mypage.html">MY PAGE</a></li>
      </ul>
      <div class="nav-icons">
        <img src="source/main/obj_cucumber_photo 1.png" alt="" />
        <img src="source/main/obj_cucumber_photo 2.png" alt="" />
        <img src="source/main/obj_cucumber_photo 3.png" alt="" />
      </div>
    </nav>

    <section class="booking-hero">
      <img src="Booking (12 Columns).png" alt="DEYA Booking" />

      <div class="booking-overlay">

        <!-- 코스 선택 -->
        <div class="bk-course">
          <button class="bk-btn course-selected">DEYA SCRUB</button>
          <ul class="bk-dropdown course-dropdown">
            <li>DEYA SCRUB</li>
            <li>DEYA MILK CARE</li>
            <li>DEYA HALF</li>
            <li>DEYA BACK</li>
            <li>DEYA BODY</li>
            <li>DEYA DEEP</li>
            <li>DEYA SPECIAL</li>
          </ul>
        </div>

        <!-- 달력 -->
        <div class="bk-cal">
          <table class="calendar-table" id="cal">
            <thead>
              <tr>
                <th>WED</th>
                <th>THU</th>
                <th>FRI</th>
                <th>SAT</th>
                <th>SUN</th>
                <th>MON</th>
                <th>TUE</th>
              </tr>
            </thead>
            <tbody id="cal-body"></tbody>
          </table>
        </div>

        <!-- 선택 정보 + Submit -->
        <div class="bk-info">
          <p id="selected-info">
            Date: 2026.06.19<br />
            Time: 9:00-10:00<br />
            Room: Room 01
          </p>
          <button class="btn-box" id="submit-btn">Submit</button>
        </div>

      </div>
    </section>

    <script>
      // 달력 생성 (June 2026, WED-start, June 1 = Monday = index 3)
      const tbody = document.getElementById("cal-body");
      const startDay = 3;
      const daysInMonth = 30;
      let day = 1 - startDay;

      for (let week = 0; week < 5; week++) {
        const tr = document.createElement("tr");
        for (let col = 0; col < 7; col++) {
          const td = document.createElement("td");
          if (day >= 1 && day <= daysInMonth) {
            td.textContent = day;
            const d = day;
            td.addEventListener("click", () => {
              document.querySelectorAll(".calendar-table td").forEach(el => el.classList.remove("selected"));
              td.classList.add("selected");
              document.getElementById("selected-info").innerHTML =
                `Date: 2026.06.${String(d).padStart(2, "0")}<br>Time: 9:00-10:00<br>Room: Room 01`;
            });
          } else {
            td.style.background = "transparent";
            td.style.cursor = "default";
          }
          tr.appendChild(td);
          day++;
        }
        tbody.appendChild(tr);
      }

      document.querySelectorAll("#cal-body td").forEach(td => {
        if (td.textContent === "19") td.classList.add("selected");
      });

      // 코스 드롭다운
      const courseWrap = document.querySelector(".bk-course");
      const courseBtn = courseWrap.querySelector(".bk-btn");
      const courseList = courseWrap.querySelector(".bk-dropdown");

      courseBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        courseList.classList.toggle("open");
      });

      courseList.querySelectorAll("li").forEach(item => {
        item.addEventListener("click", (e) => {
          e.stopPropagation();
          courseBtn.textContent = item.textContent;
          courseList.classList.remove("open");
        });
      });

      document.addEventListener("click", () => {
        courseList.classList.remove("open");
      });

      // Submit: localStorage 저장 후 마이페이지로 이동
      document.getElementById("submit-btn").addEventListener("click", () => {
        const info = document.getElementById("selected-info").innerHTML;
        const course = courseBtn.textContent.trim();
        localStorage.setItem("deya-booking-info", info);
        localStorage.setItem("deya-booking-course", course);
        location.href = "mypage.html";
      });
    </script>
  </body>
</html>
